# Default deny all ingress in traefik namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: traefik
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow external traffic to Traefik on HTTP/HTTPS ports
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-traffic
  namespace: traefik
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: traefik
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          # Traefik "web" entrypoint backing Service port 80.
          port: 8000
        - protocol: TCP
          port: 8443
