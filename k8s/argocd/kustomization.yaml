apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  # Pinned Argo CD install manifest.
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.12.3/manifests/install.yaml
  - namespace.yml
  - ingress.yml
  - network-policies.yml
  - projects/platform.yml
  - projects/blog.yml
  - projects/ragr.yml
  - apps/argocd.yml
  - apps/blog.yml
  - apps/cloudflared.yml
  - apps/logging.yml
  - apps/ragr.yml
  - apps/sealed-secrets.yml
  - apps/metallb.yml
  - apps/traefik.yml
  - apps/cert-manager.yml
  - apps/pgweb.yml

patches:
  - target:
      kind: Deployment
      name: argocd-server
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --insecure
