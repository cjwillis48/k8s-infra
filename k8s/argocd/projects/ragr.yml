apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ragr
  namespace: argocd
spec:
  description: RAGr web app and related infra
  sourceRepos:
    - git@github.com:cjwillis48/ragr.git
  destinations:
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: ragr
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: apps
      kind: Deployment
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: bitnami.com
      kind: SealedSecret
