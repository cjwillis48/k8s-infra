apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Kubernetes infra
  sourceRepos:
    - git@github.com:cjwillis48/k8s-infra.git
    - https://metallb.github.io/metallb
    - https://traefik.github.io/charts
  destinations:
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: kube-system
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: cloudflare
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: argocd
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: logging
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: metallb-system
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: traefik
  clusterResourceWhitelist:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: ""
      kind: Namespace
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: networking.k8s.io
      kind: IngressClass
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: apps
      kind: Deployment
    - group: apps
      kind: DaemonSet
    - group: apps
      kind: StatefulSet
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: networking.k8s.io
      kind: Ingress
    - group: bitnami.com
      kind: SealedSecret
    - group: metallb.io
      kind: IPAddressPool
    - group: metallb.io
      kind: L2Advertisement
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
