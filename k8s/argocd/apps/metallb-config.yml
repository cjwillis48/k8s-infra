apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: platform
  source:
    repoURL: git@github.com:cjwillis48/k8s-infra.git
    targetRevision: main
    path: k8s/metallb
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
