apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 39.0.5
    helm:
      releaseName: traefik
      valuesObject:
        service:
          spec:
            loadBalancerIP: "192.168.6.240"
        ingressRoute:
          dashboard:
            enabled: false
        providers:
          kubernetesIngress:
            publishedService:
              enabled: true
        ports:
          web:
            redirectTo:
              port: websecure
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=false
