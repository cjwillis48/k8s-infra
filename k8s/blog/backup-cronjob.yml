apiVersion: batch/v1
kind: CronJob
metadata:
  name: ghost-backup
  namespace: blog
  labels:
    app: ghost-backup
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: ghost-backup
        spec:
          automountServiceAccountToken: false
          nodeSelector:
            storage-tier: large
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: amazon/aws-cli:2.22.35
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  ENDPOINT="--endpoint-url ${R2_ENDPOINT}"

                  # Sync ghost content to a timestamped prefix in R2
                  aws s3 sync /var/lib/ghost/content \
                    "s3://ghost-backups/${TIMESTAMP}/" \
                    ${ENDPOINT}

                  echo "Backup complete: s3://ghost-backups/${TIMESTAMP}/"

                  # Prune old backups beyond 30
                  BACKUPS=$(aws s3 ls "s3://ghost-backups/" ${ENDPOINT} \
                    | awk '{print $2}' \
                    | sort)
                  COUNT=$(echo "${BACKUPS}" | wc -l)
                  if [ "${COUNT}" -gt 30 ]; then
                    DELETE_COUNT=$((COUNT - 30))
                    echo "${BACKUPS}" | head -n "${DELETE_COUNT}" | while read -r prefix; do
                      echo "Pruning s3://ghost-backups/${prefix}"
                      aws s3 rm "s3://ghost-backups/${prefix}" --recursive ${ENDPOINT}
                    done
                  fi
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: ghost-backup-r2
                      key: access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ghost-backup-r2
                      key: secret-access-key
                - name: R2_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: ghost-backup-r2
                      key: endpoint-url
                - name: AWS_DEFAULT_REGION
                  value: auto
              volumeMounts:
                - name: ghost-data
                  mountPath: /var/lib/ghost/content
                  readOnly: true
              resources:
                requests:
                  memory: 128Mi
                  cpu: 50m
                limits:
                  memory: 256Mi
                  cpu: 500m
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: ghost-data
              persistentVolumeClaim:
                claimName: ghost-data
          restartPolicy: OnFailure
