---
- name: Fail if Tailscale auth key is not set
  ansible.builtin.fail:
    msg: >-
      tailscale_auth_key is not defined. Add it to
      ansible/inventory/group_vars/all.sops.yml (use `make decrypt-secrets`,
      edit, then `make encrypt-secrets`). Generate a reusable, pre-approved,
      tagged key at https://login.tailscale.com/admin/settings/keys.
  when: tailscale_auth_key is not defined or tailscale_auth_key | length == 0

- name: Add Tailscale apt signing key
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/ubuntu/{{ tailscale_apt_codename }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"

- name: Add Tailscale apt repository
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/ubuntu/{{ tailscale_apt_codename }}.tailscale-keyring.list"
    dest: /etc/apt/sources.list.d/tailscale.list
    mode: "0644"
  register: tailscale_repo

- name: Update apt cache after Tailscale repo change
  ansible.builtin.apt:
    update_cache: true
  when: tailscale_repo.changed

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Allow Tailscale interface through UFW
  community.general.ufw:
    rule: allow
    interface: tailscale0
    direction: in

- name: Get current Tailscale status
  ansible.builtin.command:
    cmd: tailscale status --json --peers=false
  register: tailscale_status_raw
  changed_when: false
  failed_when: false

- name: Parse Tailscale status
  ansible.builtin.set_fact:
    tailscale_status: "{{ tailscale_status_raw.stdout | from_json }}"
  when: tailscale_status_raw.rc == 0 and tailscale_status_raw.stdout | length > 0

- name: Determine if `tailscale up` needs to run
  ansible.builtin.set_fact:
    tailscale_needs_up: >-
      {{
        tailscale_status is not defined
        or tailscale_status.BackendState | default('') != 'Running'
        or (tailscale_advertise_routes | sort)
           != ((tailscale_status.Self.PrimaryRoutes | default([])) | sort)
      }}

- name: Bring Tailscale up
  ansible.builtin.command:
    cmd: >-
      tailscale up
      --authkey={{ tailscale_auth_key }}
      --hostname={{ tailscale_hostname }}
      --ssh={{ tailscale_ssh | string | lower }}
      --accept-dns={{ tailscale_accept_dns | string | lower }}
      --accept-routes={{ tailscale_accept_routes | string | lower }}
      {% if tailscale_advertise_routes | length > 0 %}
      --advertise-routes={{ tailscale_advertise_routes | join(',') }}
      {% endif %}
      --reset
  when: tailscale_needs_up
  no_log: true
  changed_when: true
